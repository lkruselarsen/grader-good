name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libraw-dev pkg-config
      - run: npm ci
      - run: npm run lint
      - run: npm run build
